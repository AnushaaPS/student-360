<header>

</header>

<div class="container" id="dashboardContainer">

    <div class="card">

        <h3>Download Template</h3>

        <button onclick="downloadSoftSkillTemplate()">

            Download Template

        </button>

    </div>

    <div class="card">

        <h3>Upload Filled Excel</h3>

        <input
            type="file"
            id="softSkillFile"
            accept=".xlsx">

        <br><br>

        <button onclick="uploadSoftSkillData()">

            Upload Soft Skills

        </button>

    </div>

</div>

<script src="js/config.js"></script>

<script src="js/theme.js"></script>

<script>

function downloadSoftSkillTemplate(){

    const sampleData = [

        {

            RollNo : "22UCS113",

            Communication : 85,

            Leadership : 78,

            Teamwork : 90,

            Professionalism : 88

        },

        {

            RollNo : "22UCS114",

            Communication : 80,

            Leadership : 82,

            Teamwork : 85,

            Professionalism : 87

        }

    ];

    const ws =
        XLSX.utils.json_to_sheet(
            sampleData
        );

    const wb =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(

        wb,

        ws,

        "SOFT_SKILLS"

    );

    XLSX.writeFile(

        wb,

        "SoftSkill_Template.xlsx"

    );

}

async function uploadSoftSkillData(){

    const file =
        document.getElementById(
            "softSkillFile"
        ).files[0];

    if(!file){

        alert(
            "Please select a file"
        );

        return;

    }

    const reader =
        new FileReader();

    reader.onload =
        async function(e){

        const workbook =
            XLSX.read(

                e.target.result,

                {

                    type : "binary"

                }

            );

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const data =
            XLSX.utils.sheet_to_json(
                sheet
            );

        try{

            const response =
                await fetch(

                    API_URL,

                    {

                        method : "POST",

                        body : JSON.stringify({

                            action :
                                "uploadSoftSkill",

                            data :
                                data

                        })

                    }

                );

            const result =
                await response.json();

            alert(
                result.message
            );

        }
        catch(error){

            console.error(error);

            alert(
                "Upload Failed"
            );

        }

    };

    reader.readAsBinaryString(
        file
    );

}

function toggleSidebar(){

    document
    .getElementById("sidebar")
    .classList
    .toggle("active");

    document
    .getElementById("dashboardContainer")
    .classList
    .toggle("shift");

}

</script>
