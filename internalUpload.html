<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Internal Marks Upload</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<!-- Hamburger -->

<div class="menu-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</div>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<h3>Data Entry</h3>

<ul>

<li onclick="location.href='chairperson.html'">
Home
</li>

<li onclick="location.href='cgpaUpload.html'">
CGPA
</li>

<li onclick="location.href='semesterUpload.html'">
Semester
</li>

<li onclick="location.href='aptitudeUpload.html'">
Aptitude
</li>

<li onclick="location.href='technicalUpload.html'">
Technical Skill
</li>

<li onclick="location.href='internshipUpload.html'">
Internship
</li>

<li onclick="location.href='softskillUpload.html'">
Soft Skill
</li>

<li onclick="location.href='attendanceUpload.html'">
Attendance
</li>

<li onclick="location.href='engagementUpload.html'">
Engagement
</li>

<li onclick="location.href='placementUpload.html'">
Placement
</li>

</ul>

</div>

<div class="container" id="dashboardContainer">

<header>

<h2>Internal Marks Upload</h2>

</header>

<div class="card">

<h3>Select Internal Type</h3>

<select id="internalType">

<option value="Cycle1">
Cycle1
</option>

<option value="Cycle2">
Cycle2
</option>

<option value="Assignment">
Assignment
</option>

<option value="Model">
Model
</option>

<option value="Lab">
Lab
</option>

</select>

<br><br>

<button onclick="downloadTemplate()">
Download Template
</button>

</div>

<div class="card">

<h3>Upload Filled Excel</h3>

<input
type="file"
id="internalFile"
accept=".xlsx">

<br><br>

<button onclick="uploadInternalData()">
Upload Internal Marks
</button>

</div>

</div>

<script src="js/config.js"></script>

<script>

function toggleSidebar(){

document
.getElementById("sidebar")
.classList
.toggle("active");

document
.getElementById("dashboardContainer")
.classList
.toggle("shift");

}

/******************************************
DOWNLOAD TEMPLATE
******************************************/

function downloadTemplate(){

const internalType =
document.getElementById(
"internalType"
).value;

const sample = [

{
RollNo : "22UCS113",
Semester : "3",
CourseCode : "CS3301",
CourseName : "DBMS",
[internalType] : 78
},

{
RollNo : "22UCS114",
Semester : "3",
CourseCode : "CS3301",
CourseName : "DBMS",
[internalType] : 82
}

];

const ws =
XLSX.utils.json_to_sheet(
sample
);

const wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Internals"
);

XLSX.writeFile(
wb,
`${internalType}_Template.xlsx`
);

}

/******************************************
UPLOAD INTERNALS
******************************************/

async function uploadInternalData(){

const file =
document.getElementById(
"internalFile"
).files[0];

if(!file){

alert(
"Select Excel File"
);

return;

}

const reader =
new FileReader();

reader.onload =
async function(e){

const workbook =
XLSX.read(
e.target.result,
{
type : "binary"
}
);

const sheet =
workbook.Sheets[
workbook.SheetNames[0]
];

const data =
XLSX.utils.sheet_to_json(
sheet
);

let detectedType = "";

const possibleTypes = [
    "Cycle1",
    "Cycle2",
    "Assignment",
    "Model",
    "Lab"
];

const headers =
Object.keys(data[0]);

for(const type of possibleTypes){

    if(headers.includes(type)){

        detectedType = type;
        break;

    }

}

if(!detectedType){

    alert(
        "No valid Internal Type column found"
    );

    return;

}
console.log(data);

try{

const response =
await fetch(
API_URL,
{
method : "POST",

body : JSON.stringify({

action :
"uploadInternal",

internalType :
detectedType,

data :
data

})
}
);

const result =
await response.json();

alert(
result.message
);

}
catch(error){

console.error(error);

alert(
"Upload Failed"
);

}

};

reader.readAsBinaryString(
file
);

}

</script>

</body>

</html>
