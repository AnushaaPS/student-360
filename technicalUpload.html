href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Hamburger -->

<div class="menu-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</div>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<h3>Data Entry</h3>

</ul>

<header>

    <h2>Technical Skill Upload</h2>

</header>

<div class="container" id="dashboardContainer">

    <div class="card">

        <h3>Download Template</h3>
        
        <label>

    Domain

</label>

<select id="domainDropdown">

</select>

<br><br>

        <button onclick="downloadTechnicalTemplate()">

            Download Template

        </button>

    </div>

    <div class="card">

        <h3>Upload Filled Excel</h3>

        <input
            type="file"
            id="technicalFile"
            accept=".xlsx">

        <br><br>

        <button onclick="uploadTechnicalData()">

            Upload Technical Skills

        </button>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/fetchData.js"></script>

<script>

window.onload = async function(){

    await fetchAllData();

    loadDomains();

};

function loadDomains(){

    const domains =

        [...new Set(

            GLOBAL_DATA
            .COURSE_DOMAIN_MAP
            .map(
                d => d.Domain
            )

        )];

    document.getElementById(
        "domainDropdown"
    ).innerHTML =

    domains.map(domain =>

        `<option>${domain}</option>`

    ).join("");

}

function downloadTechnicalTemplate(){

    const selectedDomain =

    document.getElementById(
        "domainDropdown"
    ).value;

const sampleData = [

        {

            RollNo : "22UCS113",

            Domain : selectedDomain,

            Skill : "Python",

            Level : 85

        },

        {

            RollNo : "22UCS113",

            Domain : selectedDomain,

            Skill : "Java",

            Level : 78

        },

        {

            RollNo : "22UCS114",

            Domain : selectedDomain,

            Skill : "SQL",

            Level : 92

        }

    ];

    const ws =
        XLSX.utils.json_to_sheet(
            sampleData
        );

    const wb =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(

        wb,

        ws,

        "TECHNICAL_SKILLS"

    );

    XLSX.writeFile(

        wb,

        "Technical_Skill_Template.xlsx"

    );

}

async function uploadTechnicalData(){

    const file =
        document.getElementById(
            "technicalFile"
        ).files[0];

    if(!file){

        alert(
            "Please select a file"
        );

        return;

    }

    const reader =
        new FileReader();

    reader.onload =
        async function(e){

        const workbook =
            XLSX.read(

                e.target.result,

                {

                    type : "binary"

                }

            );

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const data =
            XLSX.utils.sheet_to_json(
                sheet
            );

        try{

            const response =
                await fetch(

                    API_URL,

                    {

                        method:"POST",

                        body:JSON.stringify({

                            action:
                                "uploadTechnical",

                            data:
                                data

                        })

                    }

                );

            const result =
                await response.json();

            alert(
                result.message
            );

        }
        catch(error){

            console.error(
                error
            );

            alert(
                "Upload Failed"
            );

        }

    };

    reader.readAsBinaryString(
        file
    );

}

function toggleSidebar(){

    document
    .getElementById("sidebar")
    .classList
    .toggle("active");

    document
    .getElementById("dashboardContainer")
    .classList
    .toggle("shift");

}

</script>

</body>
