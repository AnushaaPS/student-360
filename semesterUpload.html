<header>

    <h2>End Semester Grade Upload</h2>

</header>

<div class="container" id="dashboardContainer">

    <div class="card">

        <h3>Download Template</h3>

        <button onclick="downloadSemesterTemplate()">

            Download Template

        </button>

    </div>

    <div class="card">

        <h3>Upload Filled Excel File</h3>

        <input
            type="file"
            id="semesterFile"
            accept=".xlsx">

        <br><br>

        <button onclick="uploadSemesterData()">

            Upload Grades

        </button>

    </div>

</div>

<script src="js/config.js"></script>

<script>

function downloadSemesterTemplate(){

    const sampleData = [

        {

            RollNo : "22UCS113",

            Semester : "5",

            CourseCode : "CS2201",

            CourseName : "NLP",

            EndSemGrade : "A"

        },

        {

            RollNo : "22UCS113",

            Semester : "5",

            CourseCode : "CS2202",

            CourseName : "ML",

            EndSemGrade : "B+"

        }

    ];

    const ws =
        XLSX.utils.json_to_sheet(
            sampleData
        );

    const wb =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(

        wb,

        ws,

        "Semester"

    );

    XLSX.writeFile(

        wb,

        "Semester_Grade_Template.xlsx"

    );

}

async function uploadSemesterData(){

    const file =
        document.getElementById(
            "semesterFile"
        ).files[0];

    if(!file){

        alert(
            "Please select a file"
        );

        return;

    }

    const reader =
        new FileReader();

    reader.onload =
        async function(e){

        const workbook =
            XLSX.read(

                e.target.result,

                {

                    type:"binary"

                }

            );

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const data =
            XLSX.utils.sheet_to_json(
                sheet
            );

        try{

            const response =
                await fetch(

                    API_URL,

                    {

                        method:"POST",

                        body:JSON.stringify({

                            action:
                                "uploadSemester",

                            data:
                                data

                        })

                    }

                );

            const result =
                await response.json();

            alert(
                result.message
            );

        }
        catch(error){

            console.error(
                error
            );

            alert(
                "Upload Failed"
            );

        }

    };

    reader.readAsBinaryString(
        file
    );

}

function toggleSidebar(){

    document
    .getElementById("sidebar")
    .classList
    .toggle("active");

    document
    .getElementById("dashboardContainer")
    .classList
    .toggle("shift");

}

</script>
