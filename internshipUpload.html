<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Internship Upload</title>

<link rel="stylesheet"
      href="css/style.css">

      <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

    <!-- Hamburger -->

<div class="menu-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</div>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<h3>Data Entry</h3>

<ul>

<li onclick="location.href='chairperson.html'">
Home
</li>

<li onclick="location.href='cgpaUpload.html'">
CGPA
</li>

<li onclick="location.href='internalUpload.html'">
Internals
</li>

<li onclick="location.href='semesterUpload.html'">
Semester
</li>

<li onclick="location.href='aptitudeUpload.html'">
Aptitude
</li>

<li onclick="location.href='technicalUpload.html'">
Technical Skill
</li>

<li onclick="location.href='softskillUpload.html'">
Soft Skill
</li>

<li onclick="location.href='attendanceUpload.html'">
Attendance
</li>

<li onclick="location.href='engagementUpload.html'">
Engagement
</li>

<li onclick="location.href='placementUpload.html'">
Placement
</li>

</ul>

</div>

<header>

    <h2>Internship Upload</h2>

</header>

<div class="container" id="dashboardContainer">

    <div class="card">

        <h3>Download Template</h3>

        <label>

    Domain

</label>

<select id="domainDropdown">

</select>

<br><br>

        <button onclick="downloadInternshipTemplate()">

            Download Template

        </button>

    </div>

    <div class="card">

        <h3>Upload Filled Excel</h3>

        <input
            type="file"
            id="internshipFile"
            accept=".xlsx">

        <br><br>

        <button onclick="uploadInternshipData()">

            Upload Internship Data

        </button>

    </div>

    <div class="card">

    <div
        style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:15px;">

        <h3>
            Internship Feedback Score Entry
        </h3>

        <button
            onclick="saveFeedbackScores()">

            Save Feedback Scores

        </button>

    </div>

    <div class="table-container">

        <table>

            <thead>
                
            </thead>

            <tbody id="feedbackBody">

            </tbody>

        </table>

    </div>

</div>

</div>

<script src="js/config.js"></script>

<script src="js/fetchData.js"></script>

<script src="js/theme.js"></script>

<script>

window.onload = async function(){

    await fetchAllData();

    loadDomains();

    loadInternshipData();

};

function loadDomains(){

    const domains =

        [...new Set(

            GLOBAL_DATA
            .COURSE_DOMAIN_MAP
            .map(
                d => d.Domain
            )

        )];

    document.getElementById(
        "domainDropdown"
    ).innerHTML =

    domains.map(domain =>

        `<option>${domain}</option>`

    ).join("");

}

function downloadInternshipTemplate(){

    const selectedDomain =

    document.getElementById(
        "domainDropdown"
    ).value;

const sampleData = [

        {

            RollNo : "22UCS113",

            Company : "TCS",

            Domain : selectedDomain,

            DurationMonths : 2

        },

        {

            RollNo : "22UCS114",

            Company : "Infosys",

            Domain : selectedDomain,

            DurationMonths : 1

        }

    ];

    const ws =
        XLSX.utils.json_to_sheet(
            sampleData
        );

    const wb =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(

        wb,

        ws,

        "INTERNSHIP"

    );

    XLSX.writeFile(

        wb,

        "Internship_Template.xlsx"

    );

}

async function uploadInternshipData(){

    const file =
        document.getElementById(
            "internshipFile"
        ).files[0];

    if(!file){

        alert(
            "Please select a file"
        );

        return;

    }

    const reader =
        new FileReader();

    reader.onload =
        async function(e){

        const workbook =
            XLSX.read(

                e.target.result,

                {

                    type : "binary"

                }

            );

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const data =
            XLSX.utils.sheet_to_json(
                sheet
            );

        try{

            const response =
                await fetch(

                    API_URL,

                    {

                        method : "POST",

                        body : JSON.stringify({

                            action :
                                "uploadInternship",

                            data :
                                data

                        })

                    }

                );

            const result =
                await response.json();

            alert(
                result.message
            );

        }
        catch(error){

            console.error(
                error
            );

            alert(
                "Upload Failed"
            );

        }

    };

    reader.readAsBinaryString(
        file
    );

}

let internshipData = [];

async function loadInternshipData(){

    try{

        const response =
            await fetch(API_URL,{

                method:"POST",

                body:JSON.stringify({

                    action:"getInternshipData"

                })

            });

        const data =
            await response.json();

        internshipData = data;

        renderFeedbackTable();

    }
    catch(error){

        console.error(error);

    }

}

function renderFeedbackTable(){

    const tbody =
        document.getElementById(
            "feedbackBody"
        );

    if(!tbody) return;

    tbody.innerHTML = "";

    internshipData.forEach(

        (row,index)=>{

        tbody.innerHTML += `

        <tr>

            <td>${row.RollNo}</td>

            <td>${row.Company}</td>

            <td>${row.Domain}</td>

            <td>${row.DurationMonths}</td>

            <td>

                <input

                    type="number"

                    min="0"

                    max="100"

                    value="${
                        row.FeedbackScore || ''
                    }"

                    id="score_${index}"

                >

            </td>

        </tr>

        `;

    });

}

async function saveFeedbackScores(){

    const feedbackData = [];

    internshipData.forEach(

        (row,index)=>{

        feedbackData.push({

            RollNo :
                row.RollNo,

            Company :
                row.Company,

            FeedbackScore :

                document
                .getElementById(

                    `score_${index}`

                )
                .value

        });

    });

    const response =
        await fetch(API_URL,{

            method:"POST",

            body:JSON.stringify({

                action:
                    "saveFeedbackScores",

                data:
                    feedbackData

            })

        });

    const result =
        await response.json();

    alert(
        result.message
    );

}

function toggleSidebar(){

    document
    .getElementById("sidebar")
    .classList
    .toggle("active");

    document
    .getElementById("dashboardContainer")
    .classList
    .toggle("shift");

}

</script>

</body>

</html>
