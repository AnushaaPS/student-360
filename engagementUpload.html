<div class="container" id="dashboardContainer">

    <div class="card">

        <h3>Download Dynamic Template</h3>

        <button onclick="downloadEngagementTemplate()">

            Download Template

        </button>

    </div>

    <div class="card">

        <h3>Upload Filled Excel</h3>

        <input
            type="file"
            id="engagementFile"
            accept=".xlsx">

            Upload Engagement Data

        </button>

<script src="js/config.js"></script>

<script>

async function downloadEngagementTemplate(){

    const response =
    await fetch(

        API_URL,

        {

            method : "POST",

            body : JSON.stringify({

                action :
                    "getEngagementHeaders"

            })

        }

    );

const result =
    await response.json();

const headers =
    result.headers;

console.log(headers);
console.log(typeof headers);

    const sampleRow = {};

    if(!Array.isArray(headers)){

    console.log(headers);

    alert(
        "Unable to fetch engagement headers"
    );

    return;

}

headers.forEach(header=>{

        if(header==="RollNo"){

            sampleRow[header] =
                "22UCS113";

        }
        else{

            sampleRow[header] = 0;

        }

    });

    const ws =
        XLSX.utils.json_to_sheet([

            sampleRow

        ]);

    const wb =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(

        wb,

        ws,

        "ENGAGEMENT"

    );

    XLSX.writeFile(

        wb,

        "Engagement_Template.xlsx"

    );

}

async function uploadEngagementData(){

    const file =
        document.getElementById(
            "engagementFile"
        ).files[0];

    if(!file){

        alert(
            "Please select a file"
        );

        return;

    }

    const reader =
        new FileReader();

    reader.onload =
        async function(e){

        const workbook =
            XLSX.read(

                e.target.result,

                {

                    type : "binary"

                }

            );

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const data =
            XLSX.utils.sheet_to_json(
                sheet
            );

        const response =
            await fetch(

                API_URL,

                {

                    method : "POST",

                    body : JSON.stringify({

                        action :
                            "uploadEngagement",

                        data :
                            data

                    })

                }

            );

        const result =
            await response.json();

        alert(
            result.message
        );

    };

    reader.readAsBinaryString(
        file
    );

}

function toggleSidebar(){

    document
    .getElementById("sidebar")
    .classList
    .toggle("active");

    document
    .getElementById("dashboardContainer")
    .classList
    .toggle("shift");

}

</script>
