<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mentor Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet"
          href="css/style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>


    <!-- HEADER -->
    <header class="dashboard-header">

    <h2>Mentor Dashboard</h2>

    <button class="logout-btn"
            onclick="logout()">
        Logout
    </button>

</header>



    <!-- LOADER -->
    <div id="loader"></div>



    <!-- PROFILE CARD -->
<!-- DASHBOARD -->
<div class="container"
     id="mentorDashboard">

    <!-- PROFILE CARD -->
    <div class="card">

        <div class="profile-box">

            <div class="profile-avatar">

                <span id="mentorAvatar"></span>

            </div>

            <div>

                <h1 id="mentorName"></h1>

                <p id="mentorDept"></p>

                <p id="mentorRole"></p>

            </div>

        </div>

    </div>


        <!-- KPI -->
        <div class="grid">

            <div class="kpi-box">

    <h3>
        Assigned Students
    </h3>

    <h2 id="assignedStudents"></h2>

    <div
        class="kpi-tooltip"
        id="assignedStudentsTooltip">

    </div>

</div>
            <div class="kpi-box">

    <h3>
        High Risk Students
    </h3>

    <h2 id="mentorHighRisk"></h2>

    <div
        class="kpi-tooltip"
        id="mentorHighRiskTooltip">

    </div>

</div>

            <div class="kpi-box">

    <h3>
        Placement Ready
    </h3>

    <h2 id="mentorPlacementReady"></h2>

    <div
        class="kpi-tooltip"
        id="mentorPlacementReadyTooltip">

    </div>

</div>

            <div class="kpi-box">

    <h3>
        Average 360° Score
    </h3>

    <h2 id="mentorAverageScore"></h2>

    <div
        class="kpi-tooltip"
        id="mentorAverageScoreTooltip">

    </div>

</div>

        </div>



        <!-- STUDENT TABLE -->
        <div class="card">

            <div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;">

    <h3 class="section-title">

        Assigned Students

    </h3>

    <div
style="
display:flex;
gap:10px;
align-items:center;">

<input
    type="text"
    id="mentorStudentSearch"
    placeholder="Search Roll No / Name"
    style="
    width:300px;
    margin:0;">

<button
    onclick="searchMentorStudents()">

    Search

</button>

<button
    onclick="clearMentorSearch()">

    Clear

</button>

</div>

</div>

            <div class="table-container">

                <table>

                    <thead>

                        <tr>

                            <th>Roll No</th>

                            <th>Name</th>

                            <th>360° Score</th>

                            <th>Placement</th>

                            <th>Suggested Domain</th>

                            <th>Risk</th>

                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody id="mentorStudentBody">

                    </tbody>

                </table>

            </div>

        </div>



        <!-- STUDENT ANALYTICS -->
        <div class="grid">

            <div class="card">

                <h3 class="section-title">

                    Risk Distribution

                </h3>

                <canvas id="mentorRiskChart"></canvas>

            </div>

            <div class="card">

                <h3 class="section-title">

                    Placement Readiness

                </h3>

                <canvas id="mentorPlacementChart"></canvas>

            </div>

        </div>

        <!-- CORRELATION ANALYSIS -->
<div class="card">

    <h3 class="section-title">

        Correlation Analysis

    </h3>

    <div id="mentorCorrelationHeatmap">

    </div>

</div>



<!-- STUDENT PERFORMANCE HEATMAP -->
<div class="card">

    <h3 class="section-title">

        Student Performance Heatmap

    </h3>

    <div id="mentorPerformanceHeatmap">

    </div>

</div>



        <!-- INTERVENTION -->
        <div class="card">

            <h3 class="section-title">

                Mentor Recommendations

            </h3>

            <div id="mentorRecommendations">

            </div>

        </div>


    </div>


    <div
    id="studentDetailModal"
    class="student-modal">

    <div
        class="student-modal-content">

        <span
            class="close-modal"
            onclick="closeStudentModal()">

            ✕

        </span>

        <div
            id="studentDetailContent">

        </div>

    </div>

</div>

    <!-- JS FILES -->

    <script src="js/config.js"></script>

    <script src="js/fetchData.js"></script>

    <script src="js/calculations.js"></script>

    <script src="js/recommendation.js"></script>

    <script src="js/charts.js"></script>

    <script src="js/analytics.js"></script>

    <script src="js/ml_prediction.js"></script>

    <script src="js/pdf.js"></script>

    <script src="js/mentorDashboard.js"></script>

    <script src="js/correlation.js"></script>

    <script src="js/heatmap_advanced.js"></script>

    <script src="js/domainAnalytics.js"></script>

    <script src="js/logout.js"></script>


</body>

</html>
